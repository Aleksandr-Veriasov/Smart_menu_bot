<!DOCTYPE html>
<html lang="ru" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — SmartMenuBot Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🍳</div>
      <h1 class="text-2xl font-bold text-gray-900">SmartMenuBot</h1>
      <p class="text-sm text-gray-500 mt-1">Панель администратора</p>
    </div>

    <form method="post" action="/admin/login" class="bg-white shadow-sm rounded-xl px-8 py-6 space-y-4 border border-gray-200">
      {% if error %}
        <div class="bg-red-50 text-red-700 text-sm px-4 py-2 rounded-lg border border-red-200">
          {{ error }}
        </div>
      {% endif %}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
        <input name="username" type="text" autofocus required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
        <input name="password" type="password" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm py-2 rounded-lg transition-colors">
        Войти
      </button>
    </form>
  </div>

</body>
</html>
