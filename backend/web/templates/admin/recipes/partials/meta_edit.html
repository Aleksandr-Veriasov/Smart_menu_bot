{# Партиал: форма редактирования title/description. #}
<div id="recipe-meta">
  <form hx-post="/admin/recipes/{{ recipe.id }}/edit-meta"
        hx-target="#recipe-meta"
        hx-swap="outerHTML"
        class="px-5 py-4 space-y-3">
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Название</label>
      <input name="title" type="text" required value="{{ recipe.title }}"
             class="w-full border border-indigo-300 rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Описание</label>
      <textarea name="description" rows="6"
                class="w-full border border-indigo-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ recipe.description or "" }}</textarea>
    </div>
    <div class="flex items-center gap-3">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 py-2 rounded-lg transition-colors">
        Сохранить
      </button>
      <button type="button"
              hx-get="/admin/recipes/{{ recipe.id }}/view-meta"
              hx-target="#recipe-meta"
              hx-swap="outerHTML"
              class="text-xs text-gray-500 hover:text-gray-700 px-2 py-2">
        Отмена
      </button>
    </div>
  </form>
</div>
