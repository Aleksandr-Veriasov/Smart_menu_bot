{# Партиал: отображение title/description с кнопкой "Редактировать". #}
<div id="recipe-meta">
  <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
    <h2 class="text-base font-semibold text-gray-800">{{ recipe.title }}</h2>
    <button hx-get="/admin_v2/recipes/{{ recipe.id }}/edit-meta"
            hx-target="#recipe-meta"
            hx-swap="outerHTML"
            class="text-xs text-indigo-600 hover:underline">
      Редактировать
    </button>
  </div>
  {% if recipe.description %}
  <div class="px-5 py-4 text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">{{ recipe.description }}</div>
  {% else %}
  <div class="px-5 py-3 text-sm text-gray-400 italic">Описание не указано</div>
  {% endif %}
</div>
