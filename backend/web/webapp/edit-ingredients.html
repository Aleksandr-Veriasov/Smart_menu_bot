<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Ингредиенты</title>
    <link rel="stylesheet" href="/webapp/ui.css?v=2026-02-14-1" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      .ing-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

      .ing-row {
        display: grid;
        grid-template-columns: 1fr 72px 88px 32px;
        gap: 6px;
        align-items: center;
      }

      .ing-row input,
      .ing-row select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid var(--fieldBorder, rgba(0,0,0,.22));
        border-radius: 8px;
        background: var(--field, #fff);
        color: var(--text, #000);
        font-size: 14px;
        line-height: 1.3;
        -webkit-appearance: none;
      }

      .ing-row select { padding-right: 6px; cursor: pointer; }

      .ing-row .btn-remove {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 36px;
        border: none;
        background: none;
        color: var(--muted, #888);
        font-size: 18px;
        cursor: pointer;
        border-radius: 6px;
        padding: 0;
        flex-shrink: 0;
      }

      .btn-add {
        width: 100%;
        padding: 10px;
        background: none;
        border: 1px dashed var(--fieldBorder, rgba(0,0,0,.22));
        border-radius: 8px;
        color: var(--accent, #3390ec);
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="card">
        <h1 class="heading">🥕 Ингредиенты</h1>
        <p class="subtitle">Укажите название, количество и единицу измерения</p>

        <div class="ing-list" id="ing_list"></div>
        <button id="btn_add" class="btn-add" type="button">+ Добавить ингредиент</button>

        <div class="btn-row">
          <button id="back" class="btn btn-secondary" type="button">← Назад</button>
          <button id="save" type="button" class="btn btn-primary">💾 Сохранить</button>
        </div>

        <div class="notice notice-error" id="err"></div>
        <div class="notice notice-ok" id="ok"></div>

        <p class="hint">Книга рецептов</p>
      </div>
    </main>
    <script src="/webapp/edit-ingredients.js"></script>
  </body>
</html>
