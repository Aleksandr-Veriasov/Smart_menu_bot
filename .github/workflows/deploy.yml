name: Deploy to Production

on:
  workflow_run:
    workflows: ["Tests"]
    branches: [main]
    types: [completed]

jobs:
  check-tests:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Verify Tests Passed

    steps:
      - name: ✅ Tests passed - proceeding with deploy
        run: echo "Tests passed. Deployment will proceed."

  deploy:
    needs: check-tests
    runs-on: ubuntu-latest
    name: Deploy to Hetzner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 91.99.6.156 >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'telethon_session' \
            ./ root@91.99.6.156:/root/smart_menu_bot_prod/

      - name: Run deploy script on server
        run: |
          ssh -o StrictHostKeyChecking=yes -T root@91.99.6.156 <<'EOF'
            set -e
            cd /root/smart_menu_bot_prod
            echo "🚀 Starting deployment..."
            ./refresh.sh
            echo "✅ Deployment complete!"
          EOF

      - name: Notify deployment status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
